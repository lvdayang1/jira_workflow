name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: .claude/skills/jira-test-extractor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name jira-workflow --add-data "src;src" --add-data "templates;templates" --hidden-import click --hidden-import openpyxl --hidden-import docx --hidden-import pptx --hidden-import PIL src/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jira-workflow-windows
          path: .claude/skills/jira-test-extractor/dist/jira-workflow.exe

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/skills/jira-test-extractor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name jira-workflow --add-data "src:src" --add-data "templates:templates" --hidden-import click --hidden-import openpyxl --hidden-import docx --hidden-import pptx --hidden-import PIL src/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jira-workflow-linux
          path: .claude/skills/jira-test-extractor/dist/jira-workflow

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: jira-workflow-windows
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: jira-workflow-linux
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
